name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Fast pre-build guard: no network permission declared in source manifests.
      - name: Anti-leak guard (source manifests)
        run: |
          if grep -rn -E "android.permission.(INTERNET|ACCESS_NETWORK_STATE|ACCESS_WIFI_STATE)" app/src; then
            echo "::error::Network permission found in source manifests — Tryst must have no network access."
            exit 1
          fi
          echo "OK: no network permission in source manifests."

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # Build + unit tests + lint. `check` also runs the in-build merged-manifest guard
      # (checkNoNetworkDebug/Release) defined in app/build.gradle.kts.
      - name: Build, test, lint
        run: ./gradlew assembleDebug testDebugUnitTest lint checkNoNetworkDebug --stacktrace

      # Belt-and-suspenders: scan the resolved dependency tree for banned SDKs.
      - name: Banned-SDK dependency guard
        run: |
          ./gradlew :app:dependencies --configuration debugRuntimeClasspath > deps.txt
          if grep -E -i "firebase|crashlytics|com\.google\.android\.gms|facebook|appsflyer|adjust|io\.segment|amplitude|mixpanel|bugsnag|sentry" deps.txt; then
            echo "::error::Banned analytics/ads/tracking SDK found in dependency tree."
            exit 1
          fi
          echo "OK: no banned SDKs in dependency tree."

  # Code-quality gates (O-5): Detekt static analysis + ktlint formatting. Separate job so
  # failures read cleanly and run in parallel with the build job above.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Detekt + ktlint
        run: ./gradlew detekt ktlintCheck --stacktrace

  # Instrumented tests on an emulator (CI-1). These are the data-safety net: schema
  # migrations, encrypted-backup export/restore round-trips, on-disk DB encryption, media
  # crypto, and the key vault — the bug classes that can silently corrupt or lose real user
  # data. They need a device, so they only ran locally before; this job runs them in CI.
  instrumented:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # Hardware acceleration for the emulator (KVM is available on ubuntu-latest runners).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # API 34 (>= minSdk 31). google_apis x86_64 image; StrongBox is absent on emulators, so
      # the vault falls back to the TEE-backed Keystore path (handled in code) — fine for CI.
      - name: Instrumented tests (migrations, backup, crypto, vault)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          script: ./gradlew connectedDebugAndroidTest --stacktrace
